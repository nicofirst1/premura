repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude
        language: system
        types_or: [python, pyi]
      - id: ruff-format-check
        name: ruff format --check
        entry: uv run ruff format --check --force-exclude
        language: system
        types_or: [python, pyi]
