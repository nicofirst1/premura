repos:
  - repo: local
    hooks:
      - id: no-tracked-data
        name: no tracked data files
        entry: ops/check_no_tracked_data.sh
        language: system
        always_run: true
        pass_filenames: false
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check --force-exclude
        language: system
        types_or: [python, pyi]
      - id: ruff-format-check
        name: ruff format --check
        entry: uv run ruff format --check --force-exclude
        language: system
        types_or: [python, pyi]
