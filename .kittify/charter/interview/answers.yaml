schema_version: "1.0.0"
mission: "software-dev"
profile: "comprehensive"
answers:
  project_intent: >
    Premura is a local-first, agent-operable health reasoning substrate.
    The agent is the primary operational client; the human is the primary
    beneficiary. A human supplies source artifacts, questions, goals, and
    approvals; the agent does most of the internal work: ingesting,
    normalizing, selecting signals, analyzing, comparing, explaining, and
    proposing extensions. The purpose is to help a person understand what
    might be going on in their own health data so they can bring grounded,
    evidence-backed questions to a doctor and ask for the right follow-up
    tests or help. This still serves people who are afraid to go to the
    doctor in case something is wrong and people who have already seen many
    doctors without receiving a proper diagnosis or feeling listened to.
    The system's interpretations must be grounded in real science and must
    never overstate diagnostic confidence. The current technical foundation
    is a local-first Python pipeline (DuckDB warehouse, age-encrypted
    artifacts) that ingests monthly GDPR-style health exports; the shipped
    MCP/tool surface is already the default analytical path, while direct
    SQL or notebook work remains an expert fallback.
  languages_frameworks: >
    Python 3.11+ (single language; no frontend yet). Core libraries:
    typer + rich (CLI), pydantic + pydantic-settings (config), DuckDB
    >=1.1, polars (parse + transform), structlog (logging), jinja2
    (launchd plist), pyarrow, python-ulid. Dev tooling: uv (package +
    virtualenv manager), pytest + pytest-cov, ruff (lint + format), mypy
    (types). New surfaces such as agent-facing layers must justify any
    additional language or framework.
  testing_requirements: >
    pytest is the test framework. Tests live in tests/ and include
    fixture-based parser unit tests, an age round-trip suite, a launchd
    plist plutil-lint test, and a real-export regression for Health
    Connect. Any code that touches health data ships with at least one
    fixture-based test, and `pytest -q` must be green before review
    handoff. The `@pytest.mark.regression` suite may be skipped when
    real export files are absent. Test-first development is required
    for new behavior (DIRECTIVE_034): a failing test must precede the
    production code that motivates it; cycles run in minutes, not
    hours; horizontal slicing -- writing a batch of tests before any
    implementation -- is prohibited because it codifies imagined
    behavior. Tests verify behavior through public interfaces
    (DIRECTIVE_036): inside-boundary collaborators are not patched or
    imported to drive business logic; assertions target observable
    outputs (CLI exits, DuckDB row counts, file bytes, raised
    exceptions). Outside-boundary substitutes -- subprocess wrappers
    around `age`/`rclone`, `shutil.which`, config parameters --
    remain permitted.
  quality_gates: >
    Before review handoff: ruff (lint + format) clean, mypy clean for the
    changed scope, `pytest -q` green. Code must stay modular -- avoid
    monolithic or excessively interconnected designs so that small
    changes do not ripple into unrelated behavior. Pre-existing failures
    unrelated to the change must be called out explicitly, not hidden.
    Static type hints are expected on public functions; runtime input
    validation lives at the parser, CLI, and agent boundary.
  review_policy: >
    At least one focused reviewer approves before merging. The maintainer
    self-reviews via the spec-kitty implement-review loop
    (kitty-specs/* work packages). External contributions arrive as
    GitHub PRs and require maintainer approval plus all quality gates
    green before merge. CI is not configured today; review correctness
    is the merge gate. Conventional commits are not required; commit
    messages should be descriptive and reference the spec-kitty work
    package or doctrine action when applicable.
  performance_targets: >
    User-experience priorities are first-class: minimize cognitive load,
    ground every health-related claim in real science, communicate with
    empathy, and never overstate diagnostic confidence -- the app
    suggests questions to bring to a doctor; it does not diagnose. Soft
    technical targets (from SPEC §4 NFR-Performance): non-ingest CLI
    verbs respond in under 2 s; full Health Connect ingest (~200 MB
    export) under 60 s on M-series Mac; monthly end-to-end run under
    10 minutes for a ~500 MB zip; warehouse stays under 1 GB after five
    years of history.
  deployment_constraints: >
    Primary platform: macOS (launchd-scheduled monthly run). Linux and
    Windows are out of v1 scope, but the warehouse file and encrypted
    artifacts MUST remain platform-portable (stock age + DuckDB >=1.1).
    master is the single long-lived branch; feature work happens in
    spec-kitty worktrees under .worktrees/ and is merged back to master
    via the spec-kitty merge workflow. Release artifacts are git tags
    (v1.0.0 is the current release); semver applies once external users
    exist. No CI/CD, no container, no server-side deploy today -- this
    is a local-first Python toolchain installed via uv. The MCP/tool
    surface is the default analytical interface, while CLI, DuckDB, and
    notebook use remain operator or expert fallback paths. Any future
    agent-facing layer inherits the same local-first stance unless
    explicitly amended.
  documentation_policy: >
    docs/product/DOCTRINE.md, docs/product/SPEC.md,
    docs/architecture/ARCHITECTURE_HISTORY.md,
    docs/operations/STATUS.md, docs/product/USERJOURNEY.md,
    docs/product/VISION.md, and docs/product/ROADMAP.md form the
    canonical documentation set and MUST stay in sync with shipping
    behavior; STATUS.md is updated at the end of each mission.
    DOCTRINE.md is the source of truth for product stance: agent-primary
    execution, human-primary purpose. Docs are grouped by content domain
    (product/, architecture/, operations/, research/); see docs/README.md
    for the full index. README.md is the quick-start and should present
    the agent-mediated path as default. As external users arrive, every
    release tag MUST be accompanied by a CHANGELOG entry and a license
    file at the repo root; user-visible CLI or agent-surface changes MUST
    be reflected in README.md and the relevant docs. spec-kitty mission
    artifacts in kitty-specs/ are the source of truth for in-flight work
    and are not duplicated into docs/.
  risk_boundaries: >
    Non-negotiable governance boundaries for this project:
    (1) No live API scraping for personal health data -- ingestion uses
    official user-initiated exports only (GDPR dumps, HC auto-export
    files, app-export CSVs). python-garminconnect-style logins, Google
    Fit REST, and Apple HealthKit are out of scope.
    (2) Local-first and offline by default -- the pipeline MUST run
    end-to-end with no network. Cloud upload is opt-in (hpipe upload),
    never part of the automated run. hpipe doctor and all read paths
    MUST NOT phone home. Any agent-facing layer added later inherits
    this stance.
    (3) Scientific grounding -- any health interpretation surfaced to
    the user (including via agents) MUST cite evidence and MUST NOT
    overstate diagnostic confidence. The system suggests questions and
    next steps; it does not diagnose.
    (4) Human-on-the-loop approvals -- agents may do most internal
    analytical and integration work autonomously after the human supplies
    artifacts and goals, but any sensitive external action, policy
    change, charter or governance change, or over-the-boundary health
    claim requires explicit human approval first.
    (5) PHI hygiene -- no PHI in logs, tests, or commits;
    age-encryption is mandatory before any cloud upload; age.key
    permissions are chmod 0600.
  amendment_process: >
    The charter is amended by editing .kittify/charter/charter.md
    directly and running `spec-kitty charter sync --json`. Material
    amendments (changing a risk boundary, lowering a quality gate,
    adding or removing a directive) MUST be committed in a dedicated
    commit whose message starts with "charter:" and links to the
    spec-kitty mission or issue that motivated the change. Editorial
    fixes (typos, clarifications) may ride in any commit. The interview
    answers in this file are the editable source for regeneration; if
    the charter diverges from these answers, regenerate rather than
    hand-edit downstream YAML.
  exception_policy: >
    Quality-gate exceptions (e.g., a known-failing mypy line that is
    pre-existing scope) MUST be called out explicitly in the work
    package or PR description with a one-line rationale; silent skips
    are not permitted. Risk-boundary exceptions (live API access,
    online-only behavior, unsourced or overconfident health claims)
    are not allowed under this charter -- a feature that requires
    breaching one of the risk boundaries requires a charter amendment
    first. PHI-handling security requirements (encryption, key
    permissions, no-PHI-in-logs) admit no exceptions.
