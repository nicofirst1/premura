# === Sleep ===
- metric_id: sleep_session
  display_name: Sleep session
  canonical_unit: enum
  value_kind: interval
  description: Outer wrapper interval spanning the whole sleep period.

- metric_id: sleep_stage
  display_name: Sleep stage
  canonical_unit: enum
  value_kind: interval
  description: Sub-interval inside a sleep_session; value_text in {awake, light, deep, rem, unknown}.

- metric_id: sleep_actigraphy
  display_name: Sleep actigraphy
  canonical_unit: index
  value_kind: instantaneous
  description: Per-minute motion-derived score from Sleep as Android.

- metric_id: sleep_rating
  display_name: Sleep rating
  canonical_unit: score
  value_kind: aggregate

- metric_id: sleep_deep_pct
  display_name: Sleep deep (%)
  canonical_unit: pct
  value_kind: aggregate

# === Exercise / wellness ===
- metric_id: exercise_session
  display_name: Exercise session
  canonical_unit: enum
  value_kind: interval
  description: HC exercise session with exercise_type code in value_text.

- metric_id: mindfulness_session
  display_name: Mindfulness session
  canonical_unit: enum
  value_kind: interval

- metric_id: intensity_minutes
  display_name: Intensity minutes
  canonical_unit: min
  value_kind: aggregate

- metric_id: activity_summary
  display_name: Activity summary
  canonical_unit: enum
  value_kind: interval
  description: Garmin per-activity summary row.

- metric_id: daily_wellness
  display_name: Daily wellness rollup
  canonical_unit: composite
  value_kind: aggregate
  description: Garmin UDS daily aggregate (resting HR, steps, intensity minutes), payload in raw_payload.
