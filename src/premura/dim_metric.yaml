  canonical_unit: mmHg
  value_kind: instantaneous

- metric_id: blood_glucose
  display_name: Blood glucose
  canonical_unit: mmol_per_l
  value_kind: instantaneous

- metric_id: body_temperature
  display_name: Body temperature
  canonical_unit: celsius
  value_kind: instantaneous

- metric_id: skin_temperature
  display_name: Skin temperature delta
  canonical_unit: celsius
  value_kind: instantaneous

# === Body composition ===
- metric_id: weight
  display_name: Body weight
  canonical_unit: kg
  value_kind: instantaneous

- metric_id: body_fat_pct
  display_name: Body fat (%)
