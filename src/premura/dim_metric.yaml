# Controlled vocabulary for hp.dim_metric.
# Append-only; never repurpose an existing metric_id.
# value_kind: 'instantaneous' = single point-in-time, 'aggregate' = pre-summarized (e.g. daily),
#             'interval' = has start/end (lives in hp.fact_interval).

# === Cardio / autonomic ===
- metric_id: heart_rate
  display_name: Heart rate
  canonical_unit: bpm
  value_kind: instantaneous
  description: Instantaneous heart rate sample.

- metric_id: resting_hr
  display_name: Resting heart rate
  canonical_unit: bpm
  value_kind: aggregate
  description: Daily resting heart rate.

- metric_id: hrv_rmssd
  display_name: HRV (rMSSD)
  canonical_unit: ms
  value_kind: instantaneous
  description: Generic HRV rMSSD (used by HC + BMT-style sources).

- metric_id: hrv_rmssd_overnight
  display_name: HRV (rMSSD, overnight)
  canonical_unit: ms
  value_kind: aggregate
  description: Garmin overnight rMSSD summary.

- metric_id: hrv_rmssd_snapshot
  display_name: HRV (rMSSD, Health Snapshot)
  canonical_unit: ms
  value_kind: instantaneous
  description: Garmin Health Snapshot rMSSD reading.

- metric_id: resp_rate
  display_name: Respiratory rate
  canonical_unit: breaths_per_min
  value_kind: instantaneous

- metric_id: spo2
  display_name: Oxygen saturation
  canonical_unit: pct
  value_kind: instantaneous

- metric_id: stress
  display_name: Stress (0-100)
  canonical_unit: score_0_100
  value_kind: instantaneous
  description: Garmin proprietary stress score.

- metric_id: body_battery
  display_name: Body Battery (0-100)
  canonical_unit: score_0_100
  value_kind: instantaneous
  description: Garmin proprietary energy gauge.

- metric_id: training_load
  display_name: Training load
  canonical_unit: score
  value_kind: aggregate

- metric_id: training_status
  display_name: Training status
  canonical_unit: enum
  value_kind: aggregate

- metric_id: training_readiness
  display_name: Training readiness
  canonical_unit: score_0_100
  value_kind: aggregate

