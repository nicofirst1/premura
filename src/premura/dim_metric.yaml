  value_kind: instantaneous

- metric_id: lean_body_mass
  display_name: Lean body mass
  canonical_unit: kg
  value_kind: instantaneous

- metric_id: body_water_mass
  display_name: Body water mass
  canonical_unit: kg
  value_kind: instantaneous

- metric_id: bone_mass
  display_name: Bone mass
  canonical_unit: kg
  value_kind: instantaneous

- metric_id: muscle_mass
  display_name: Muscle mass
  canonical_unit: kg
  value_kind: instantaneous

- metric_id: bmi
  display_name: Body mass index
  canonical_unit: kg_per_m2
  value_kind: instantaneous

- metric_id: visceral_fat
  display_name: Visceral fat (index)
  canonical_unit: index
  value_kind: instantaneous

- metric_id: height
  display_name: Height
  canonical_unit: m
  value_kind: instantaneous

# === Energy / activity ===
- metric_id: steps
  display_name: Steps
  canonical_unit: count
  value_kind: interval

- metric_id: distance
  display_name: Distance
  canonical_unit: m
  value_kind: interval

- metric_id: active_kcal
  display_name: Active calories
  canonical_unit: kcal
  value_kind: interval

- metric_id: total_kcal
  display_name: Total calories
  canonical_unit: kcal
  value_kind: interval

- metric_id: vo2_max
  display_name: VO2 max
  canonical_unit: ml_per_kg_per_min
