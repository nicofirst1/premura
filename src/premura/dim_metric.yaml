# Controlled vocabulary for hp.dim_metric.
# Append-only; never repurpose an existing metric_id.
# value_kind: 'instantaneous' = single point-in-time, 'aggregate' = pre-summarized (e.g. daily),
#             'interval' = has start/end (lives in hp.fact_interval).
#
# WP01 (v2 skeleton) adds six ontology fields to every row that needs them:
#   category, validity_window, missing_data_policy, aliases, loinc, ieee1752
# Legacy v1 metric_ids are preserved as-is; the eventual canonical-vocabulary
# rewrite (e.g. namespacing) is deferred to a later full-rebuild mission.
# `lab:*` rows MUST carry a `loinc` value (real code or the literal "[unmapped]").

