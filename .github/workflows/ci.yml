name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # age/age-keygen let the encrypt round-trip tests run instead of skipping.
      - name: Install age
        run: sudo apt-get update -q && sudo apt-get install -y -q age

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.11"

      - name: Lockfile up to date
        run: uv lock --check

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: No tracked data files
        run: ./ops/check_no_tracked_data.sh

      - name: Lint (ruff check)
        run: uv run ruff check

      - name: Format (ruff format --check)
        run: uv run ruff format --check

      - name: Types (mypy src/)
        run: uv run mypy src/

      - name: Tests (default suite)
        run: uv run pytest -q
