version: 1
title: Semantic Invariants
review_mode: agent_first
invariants:
  - invariant_id: INV-001
    statement: Every normalized example maps to exactly one canonical home.
    applies_to:
      - profile_context
      - nutrition_intake
      - supplement_intake
      - observation_history
      - note_history
    detection_intent: Contract examples and tests must reject dual-classification or ambiguous-classification cases.
    violation_examples:
      - Treating supplement dose as both intake and body observation
      - Treating declared standing height as the same thing as a measured height row
  - invariant_id: INV-002
    statement: Profile assertions, intake records, and observations remain semantically distinct even when they describe similar real-world subjects.
    applies_to:
      - profile_context
      - nutrition_intake
      - supplement_intake
      - observation_history
    detection_intent: Contract examples and docs must preserve distinct entity names and meanings for overlap cases.
    violation_examples:
      - Back-dooring biological sex into fact_measurement
      - Storing meal nutrients as generic body measurements
  - invariant_id: INV-003
    statement: Corrections and supersessions remain visible; new assertions do not silently erase prior provenance.
    applies_to:
      - profile_context
      - nutrition_intake
      - supplement_intake
    detection_intent: Contract entities must include visible supersession/correction paths.
    violation_examples:
      - Overwriting a birth date or meal estimate without audit-visible lineage
  - invariant_id: INV-004
    statement: Future functions must declare profile and intake prerequisites explicitly.
    applies_to:
      - engine_contract
      - mcp_contract
    detection_intent: Future contract/test surfaces must reject consumers that rely on undeclared profile or intake context.
    violation_examples:
      - BMI implementation reading opportunistic height data without a declared dependency
      - Supplement-effect logic assuming dose history from notes
  - invariant_id: INV-005
    statement: Partial knowledge is allowed; fabricated values are not.
    applies_to:
      - nutrition_intake
      - supplement_intake
      - profile_context
    detection_intent: Contract examples must permit missing subfields while forbidding invented nutrient, ingredient, or profile values.
    violation_examples:
      - Filling unknown micronutrients with zeros
      - Inventing a supplement ingredient breakdown from a brand name alone
