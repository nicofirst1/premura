version: 1
title: Profile and Intake Domain Entities
scope: semantic_contract_only
storage_prescribed: false
entities:
  - name: ProfileAttribute
    purpose: Define one baseline-profile concept without storing the operator value itself.
    required_fields:
      - attribute_key
      - value_kind
      - stability_class
      - description
  - name: ProfileAssertion
    purpose: Record one asserted value for one baseline-profile attribute with provenance and effective time.
    required_fields:
      - assertion_id
      - attribute_key
      - value
      - effective_start
      - asserted_at
      - provenance_kind
      - source_reference
  - name: IntakeEvent
    purpose: Anchor one eating, drinking, or supplement-taking occurrence in time.
    required_fields:
      - intake_event_id
      - event_kind
      - occurred_at
      - provenance_kind
      - source_reference
  - name: IntakeItem
    purpose: Represent one consumed thing inside one intake event.
    required_fields:
      - intake_item_id
      - intake_event_id
      - item_kind
      - label
  - name: NutritionFact
    purpose: Attach an energy or nutrient amount to an intake item or event.
    required_fields:
      - nutrition_fact_id
      - subject_kind
      - subject_id
      - fact_key
      - amount
      - unit
      - estimate_quality
  - name: SupplementDose
    purpose: Attach a taken dose to a supplement intake item.
    required_fields:
      - supplement_dose_id
      - intake_item_id
      - dose_amount
      - dose_unit
      - ingredient_scope
  - name: DependencyDeclaration
    purpose: Declare explicit prerequisites for future functions or workflows.
    required_fields:
      - consumer_name
      - depends_on_domain
      - required_keys
      - failure_mode
overlap_examples:
  - example: standing_height_declared
    canonical_home: profile_context
  - example: smart_scale_height_measurement
    canonical_home: observation_history
  - example: meal_energy_kcal
    canonical_home: nutrition_intake
  - example: supplement_capsule_dose
    canonical_home: supplement_intake
  - example: clinical_free_text_note
    canonical_home: note_history
