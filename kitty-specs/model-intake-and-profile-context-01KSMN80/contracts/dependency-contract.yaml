version: 1
title: Dependency Declaration Contract
purpose: Define how future functions and workflows declare prerequisites on profile and intake domains.
storage_prescribed: false
declaration_shape:
  required_fields:
    - consumer_name
    - depends_on_domain
    - required_keys
    - failure_mode
  field_meanings:
    consumer_name: Stable name of the function, workflow, or tool.
    depends_on_domain: One or more of profile_context, nutrition_intake, supplement_intake, observation_history.
    required_keys: Specific attributes, nutrition facts, doses, or observation metrics required.
    failure_mode: Honest behavior when prerequisites are absent, stale, partial, or unknown.
rules:
  - A consumer that needs profile context must name the exact profile keys it depends on.
  - A consumer that needs nutrition or supplement context must name the exact intake facts or dose keys it depends on.
  - Depending on opportunistic presence in observation history is not a substitute for a declaration.
  - A declaration may be satisfied by different storage adapters, but the meaning of the requirement must stay unchanged.
examples:
  - consumer_name: bmi_status
    depends_on_domain:
      - profile_context
      - observation_history
    required_keys:
      - standing_height_declared
      - weight
    failure_mode: refuse_with_missing_profile_context
  - consumer_name: protein_intake_summary
    depends_on_domain:
      - nutrition_intake
    required_keys:
      - protein_g
    failure_mode: return_partial_if_some_events_missing
  - consumer_name: supplement_adherence_summary
    depends_on_domain:
      - supplement_intake
    required_keys:
      - dose_amount
      - dose_unit
    failure_mode: refuse_if_dose_history_not_normalized
