version: 1
name: bmi_proof_consumer
summary: >-
  First cross-domain Stage 2 consumer used to validate the input-resolution seam.

consumer:
  name: bmi
  purpose: >-
    Prove that one Stage 2 answer can resolve declared prerequisites across
    profile context and observation history honestly.

dependencies:
  - domain: profile_context
    required_key: standing_height_cm
    failure_mode: explicit_missing_input
  - domain: observation_history
    required_key: weight
    failure_mode: explicit_missing_or_stale_input

request:
  required_fields:
    - anchor_ts

success_output:
  fields:
    - name: status
      value: available
    - name: bmi_value
      type: number
    - name: anchor_ts
      type: datetime
    - name: caveats
      type: list[string]

refusal_output:
  fields:
    - name: status
      values:
        - missing_input
        - stale_input
        - insufficient_data
    - name: missing_input_report
      type: object
    - name: message
      type: string

rules:
  - BMI may only succeed when both declared dependencies resolve as usable.
  - >-
    BMI must not substitute a measured height observation for the declared
    profile-context dependency.
  - >-
    BMI is a proof consumer for this mission, not a broad user-facing analytical
    surface or a clinical interpretation layer.
