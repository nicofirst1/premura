version: 1
name: stage2_input_resolution_surface
summary: >-
  Declared, domain-aware Stage 2 input-resolution contract for supported and
  not-yet-supported semantic domains.

entities:
  - name: DependencyDeclaration
    fields:
      - name: consumer_name
        type: string
        required: true
      - name: depends_on_domain
        type: enum
        required: true
        values:
          - observation_history
          - profile_context
          - nutrition_intake
          - supplement_intake
      - name: required_key
        type: string
        required: true
      - name: failure_mode
        type: string
        required: true

  - name: ResolutionRequest
    fields:
      - name: anchor_ts
        type: datetime
        required: true
      - name: dependency
        type: DependencyDeclaration
        required: true

  - name: ResolvedInput
    fields:
      - name: domain
        type: string
        required: true
      - name: required_key
        type: string
        required: true
      - name: anchor_ts
        type: datetime
        required: true
      - name: usable
        type: boolean
        required: true
      - name: absence_reason
        type: string
        required: false
      - name: message
        type: string
        required: false

domain_specific_variants:
  - name: observation_resolution
    extends: ResolvedInput
    extra_fields:
      - name: resolved_value
        type: number
        required: false
      - name: observed_at
        type: datetime
        required: false
      - name: freshness_state
        type: string
        required: false

  - name: profile_as_of_resolution
    extends: ResolvedInput
    extra_fields:
      - name: resolved_value
        type: scalar
        required: false
      - name: effective_start_utc
        type: datetime
        required: false
      - name: effective_end_utc
        type: datetime
        required: false
      - name: source_kind
        type: string
        required: false

  - name: unresolved_domain_resolution
    extends: ResolvedInput
    extra_fields: []

rules:
  - >-
    Resolution is domain-aware. A dependency declared against profile_context,
    nutrition_intake, or supplement_intake must not be silently satisfied by an
    observation-history row.
  - >-
    Supported domains in this mission are observation_history and
    profile_context.
  - >-
    nutrition_intake and supplement_intake remain valid declaration targets but
    resolve to an explicit unresolved or missing-input outcome until future
    missions ship concrete resolvers backed by real rows.
  - >-
    The contract promises one declaration surface and one resolution protocol,
    not one universal resolved payload shape.
