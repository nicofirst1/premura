version: 1
name: resolver_registry_surface
summary: >-
  Static in-tree registration pattern for Stage 2 domain resolvers.

registry:
  builtin_modules_field: _BUILTIN_RESOLVER_MODULES
  resolver_map_field: RESOLVERS
  key: semantic_domain

expected_behavior:
  - >-
    Adding a supported built-in resolver should require adding one module entry
    and one domain-to-resolver registration, without rewriting existing dispatch
    branches.
  - >-
    Registry growth is in-tree and explicit in this mission. No filesystem
    scanning or out-of-tree dynamic discovery is introduced here.

initial_supported_domains:
  - observation_history
  - profile_context

deferred_domains_without_registry_entries:
  - nutrition_intake
  - supplement_intake

rules:
  - >-
    Resolver dispatch is open to future supported domains, but answer-family
    growth remains closed and review-gated.
  - >-
    The registry is a structural pattern for supported resolvers, not a promise
    that every declared domain already has a concrete resolver.
